services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AD_SERVER=${AD_SERVER:-dc01.yourdomain.com}
      - AD_BASE_DN=${AD_BASE_DN:-dc=yourdomain,dc=com}
      - AD_USER=${AD_USER:-admin@yourdomain.com}
      - AD_PASSWORD=${AD_PASSWORD:-}
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - AD_SERVER=${AD_SERVER:-dc01.yourdomain.com}
      - AD_BASE_DN=${AD_BASE_DN:-dc=yourdomain,dc=com}
      - AD_USER=${AD_USER:-admin@yourdomain.com}
      - AD_PASSWORD=${AD_PASSWORD:-}
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - .:/app
    profiles:
      - dev

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.tasks.celery worker --loglevel=info
    environment:
      - AD_SERVER=${AD_SERVER:-dc01.yourdomain.com}
      - AD_BASE_DN=${AD_BASE_DN:-dc=yourdomain,dc=com}
      - AD_USER=${AD_USER:-admin@yourdomain.com}
      - AD_PASSWORD=${AD_PASSWORD:-}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    profiles:
      - full

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
